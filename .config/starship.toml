"$schema" = 'https://starship.rs/config-schema.json'

format = """$directory\
$git_branch $git_metrics\
$line_break\
$character"""

right_format = """$cmd_duration$jobs$status"""

palette = "everforest"

command_timeout = 1000

[palettes.everforest]
bg        = "#2b3339"
fg        = "#d3c6aa"
red       = "#e67e80"
green     = "#a7c080"
yellow    = "#dbbc7f"
blue      = "#7fbbb3"
magenta   = "#d699b6"
cyan      = "#83c092"
gray      = "#859289"

[fill]
symbol = " "

[directory]
disabled = false
truncation_length = 100
truncate_to_repo = false
style = "blue bold"
format = "[$path]($style) "

[directory.substitutions]
"~/Development/" = "dev/"

[git_branch]
symbol = " "
style = "green"
format = "[on ](gray)[$symbol$branch]($style)"

[git_metrics]
disabled = false

[character]
success_symbol = "[❯](green bold)"
error_symbol   = "[❯](red bold)"
vimcmd_symbol  = "[❮](yellow bold)"

[cmd_duration]
min_time = 2_000
style = "yellow"
format = "[ $duration]($style) "

[jobs]
symbol = "✦ "
style = "magenta"
number_threshold = 1
format = "[$symbol$number]($style) "

[status]
disabled = false
style = "red bold"
symbol = "✖ "
format = "[$symbol$status]($style)"
